<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bibliotheca - Das Konsortium</title>
    <style>
        body {
            background-color: #1a1a1a;
            font-family: 'Georgia', serif;
            color: #5d4037;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f4e4bc;
            font-variant: small-caps;
            font-size: 3em;
            margin-bottom: 10px;
            border-bottom: 2px solid #f4e4bc;
        }

        .subtitle {
            color: #f4e4bc;
            font-style: italic;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Das Regal-Raster */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* Die Papyrus-Buchbox */
        .book-box {
            background-color: #f4e4bc;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border: 2px solid #5d4037;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        .book-box:hover {
            transform: translateY(-5px) rotate(1deg);
            box-shadow: 8px 8px 20px rgba(0,0,0,0.4);
            background-color: #f9ecd2;
        }

        .book-box h3 {
            margin: 0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.2);
            padding-bottom: 10px;
        }

        .book-box .meta {
            font-size: 0.8em;
            font-style: italic;
            margin-top: 15px;
            color: #8b5e3c;
        }

        .book-box .btn-open {
            margin-top: 15px;
            font-size: 0.7em;
            text-decoration: none;
            color: #f4e4bc;
            background: #5d4037;
            padding: 5px 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Bibliotheca Universalis</h1>
    <p class="subtitle">Verzeichnis der Werke & Manuskripte</p>

    <div class="library-grid">
        <!-- Hier folgen deine Titel -->
        <style>
    /* Das dunkle Overlay im Hintergrund */
    .modal {
        display: none; 
        position: fixed; 
        z-index: 1000; 
        left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.9);
        backdrop-filter: blur(5px);
    }

    /* Das eigentliche Fenster */
    .modal-content {
        background-color: #f4e4bc;
        margin: 5% auto;
        padding: 30px;
        border: 3px solid #5d4037;
        width: 70%;
        max-width: 800px;
        display: flex;
        gap: 30px;
        box-shadow: 0 0 50px rgba(227, 192, 125, 0.2);
    }

    .modal-left img {
        width: 250px;
        height: auto;
        border: 5px solid #fff;
        box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
    }

    .modal-right {
        color: #5d4037;
        text-align: left;
    }

    .close-btn {
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }
</style>

<!-- Das Fenster-Element -->
<div id="bookModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-left">
            <img id="modalImg" src="img/platzhalter.jpg" alt="Buchcover">
        </div>
        <div class="modal-right">
            <h2 id="modalTitle" style="font-variant: small-caps;">Buchtitel</h2>
            <p id="modalDesc" style="font-style: italic; line-height: 1.6;">
                Hier steht die Beschreibung des Werkes...
            </p>
        </div>
    </div>
</div>

<script>
    const bucherDaten = {
        "Autorenmanagement KAW": { desc: "Die Verwaltung der Schriften...", img: "img/kaw.jpg" },
        "VPf Narkose": { desc: "Eine medizinische Abhandlung...", img: "img/narkose.jpg" },
        // ... hier kannst du für alle 21 Bücher Beschreibungen einfügen
    };

    function openModal(titel) {
        const daten = bucherDaten[titel] || { desc: "Beschreibung folgt...", img: "img/placeholder.jpg" };
        document.getElementById('modalTitle').innerText = titel;
        document.getElementById('modalDesc').innerText = daten.desc;
        document.getElementById('modalImg').src = daten.img;
        document.getElementById('bookModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('bookModal').style.display = "none";
    }

    // Erzeugt die Boxen (angepasst für Klick-Funktion)
    const bucher = Object.keys(bucherDaten); // Oder deine alte Liste
    const grid = document.querySelector('.library-grid');
    
    // Tipp: Hier deine 21 Titel eintragen
    const alleTitel = ["Autorenmanagement KAW", "VPf Narkose", "Medikus Narkose", "Goliat Narcose", "Das Dutzend der Stille", "Lastenzinsen Claud", "Die goldene Hautlinie", "Das Skelett mit Muskeln", "Lovecube", "KAW Lyric", "Refugium AdR", "Der Kaufrausch-Code", "Phönix im Gehirn", "Vorurteils des Adlers", "Kalter Herd", "Ausgetragen", "Geisterallee", "Geisterkiste", "Kaltes Herd-Kian", "Geisterplan", "Moosgasse"];

    alleTitel.forEach(titel => {
        const box = document.createElement('div');
        box.className = 'book-box';
        box.onclick = () => openModal(titel);
        box.innerHTML = `
            <h3>${titel}</h3>
            <div class="meta">Argumentum & Effigies</div>
            <span class="btn-open">Details ansehen</span>
        `;
        grid.appendChild(box);
    });
</script>

    </div>

</body>
</html>
